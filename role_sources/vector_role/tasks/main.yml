---
- name: Create vector group
  become: true
  ansible.builtin.group:
    name: "{{ vector_group }}"
    state: present

- name: Create vector user
  become: true
  ansible.builtin.user:
    name: "{{ vector_user }}"
    group: "{{ vector_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Create vector install directory
  become: true
  ansible.builtin.file:
    path: "{{ vector_install_dir }}"
    state: directory
    owner: "{{ vector_user }}"
    group: "{{ vector_group }}"
    mode: "0755"

- name: Create vector config directory
  become: true
  ansible.builtin.file:
    path: "{{ vector_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create vector data directory
  become: true
  ansible.builtin.file:
    path: "{{ vector_data_dir }}"
    state: directory
    owner: "{{ vector_user }}"
    group: "{{ vector_group }}"
    mode: "0755"

- name: Download Vector archive
  become: true
  ansible.builtin.get_url:
    url: "{{ vector_download_url }}"
    dest: "/tmp/vector-{{ vector_version }}.tar.gz"
    mode: "0644"
    timeout: 60
  register: vector_download
  retries: 3
  delay: 5
  until: vector_download is succeeded
  when: not ansible_check_mode

- name: Unarchive Vector
  become: true
  ansible.builtin.unarchive:
    src: "/tmp/vector-{{ vector_version }}.tar.gz"
    dest: "{{ vector_install_dir }}"
    remote_src: true
    extra_opts:
      - "--strip-components=2"
    creates: "{{ vector_install_dir }}/bin/vector"
  when: not ansible_check_mode

- name: Deploy vector config
  become: true
  ansible.builtin.template:
    src: vector.yml.j2
    dest: "{{ vector_config_dir }}/vector.yml"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Validate vector config
    - Restart vector
  when: not ansible_check_mode

- name: Deploy vector systemd unit
  become: true
  ansible.builtin.template:
    src: vector.service.j2
    dest: /etc/systemd/system/vector.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart vector

- name: Ensure vector service is enabled and started
  become: true
  ansible.builtin.systemd:
    name: vector
    enabled: true
    state: started
    daemon_reload: true
  when: not ansible_check_mode